# ============================================================
# 🚀 CI/CD – Backend ML Recommendation Service (Docker → Railway)
# ============================================================

name: 🚀 CI/CD – Backend ML Recommendation Service (Docker → Railway)

on:
  push:
    branches:
      - main

  workflow_dispatch:

  # Daily at 4:30 AM IST (23:00 UTC)
  schedule:
    - cron: "0 23 * * *"

jobs:
  ci-cd-backend-ml-recommendation:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: pythoncodelife/backend-ml-recommendation-service
      IMAGE_TAG: latest
      LIVE_URL: https://backend-ml-recommendation-service-production.up.railway.app/

    steps:

      # =====================================================
      # CHECKOUT
      # =====================================================
      - name: 🧾 Checkout source code
        uses: actions/checkout@v4

      # =====================================================
      # BUILD TIMESTAMPS
      # =====================================================
      - name: ⏱️ Generate build timestamps (UTC + IST)
        run: |
          echo "BUILD_TIME_UTC=$(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_ENV
          echo "BUILD_TIME_IST=$(TZ=Asia/Kolkata date '+%Y-%m-%d %I:%M:%S %p IST')" >> $GITHUB_ENV

      # =====================================================
      # DOCKER SETUP
      # =====================================================
      - name: 🐳 Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # =====================================================
      # BUILD & PUSH IMAGE
      # =====================================================
      - name: 🏗️ Build & Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      # =====================================================
      # DOCKER SUCCESS EMAIL
      # =====================================================
      - name: 📧 Docker Build Success Email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "✅ Docker Build Success | Backend ML Recommendation Service"
          html_body: |
            <h2>🐳 Docker Image Built Successfully</h2>
            <p><b>Image:</b> ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}</p>
            <p><b>UTC:</b> ${{ env.BUILD_TIME_UTC }}</p>
            <p><b>IST:</b> ${{ env.BUILD_TIME_IST }}</p>
          to: ${{ secrets.MAIL_TO }}
          cc: ${{ secrets.MAIL_CC }}
          from: ${{ secrets.MAIL_USERNAME }}

      # =====================================================
      # DEPLOY TO RAILWAY
      # =====================================================
      - name: 🚀 Deploy to Railway
        run: |
          curl --fail -X POST "https://backboard.railway.app/graphql/v2" \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{
              "query": "mutation { serviceInstanceDeploy(serviceId: \"'${{ secrets.RAILWAY_SERVICE_ID }}'\", environmentId: \"'${{ secrets.RAILWAY_ENVIRONMENT_ID }}'\") }"
            }'

      # =====================================================
      # DEPLOY SUCCESS EMAIL
      # =====================================================
      - name: 📧 Deployment Success Email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "🚀 Deployment Success | Backend ML Recommendation Service"
          html_body: |
            <h2>🚀 Backend ML Recommendation Service is LIVE</h2>
            <p><b>Live URL:</b> <a href="${{ env.LIVE_URL }}">${{ env.LIVE_URL }}</a></p>
            <p><b>Docker Image:</b> ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}</p>
            <p><b>UTC:</b> ${{ env.BUILD_TIME_UTC }}</p>
            <p><b>IST:</b> ${{ env.BUILD_TIME_IST }}</p>
          to: ${{ secrets.MAIL_TO }}
          cc: ${{ secrets.MAIL_CC }}
          from: ${{ secrets.MAIL_USERNAME }}

      # =====================================================
      # FAILURE EMAIL
      # =====================================================
      - name: ❌ CI/CD Failure Email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "❌ CI/CD Failed | Backend ML Recommendation Service"
          html_body: |
            <h2 style="color:red;">❌ Pipeline Failed</h2>
            <p><b>UTC:</b> ${{ env.BUILD_TIME_UTC }}</p>
            <p><b>IST:</b> ${{ env.BUILD_TIME_IST }}</p>
          to: ${{ secrets.MAIL_TO }}
          cc: ${{ secrets.MAIL_CC }}
          from: ${{ secrets.MAIL_USERNAME }}
